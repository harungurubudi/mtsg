# MTSG Application Configuration
# This file contains the default configuration values for the MTSG application.
# Environment variables with the MTSG_ prefix will override these values.

server:
  # HTTP server configuration
  port: "8080"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"
  environment: "development"

redis:
  # Redis connection configuration
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10 